name: Generate Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run report
        run: bash scripts/report.sh
        env:
          BOARD_URL: ${{ vars.BOARD_URL }}
          SHIPIT_TOKEN: ${{ secrets.SHIPIT_TOKEN }}
